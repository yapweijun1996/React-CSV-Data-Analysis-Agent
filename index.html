<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Analysis</title>
    <!--
      ASSET BASE PATH — edit this after build to match your deployment layout.
      Examples:
        <base href="./" />                   — index.html sits next to assets/ (default)
        <base href="./dist/" />              — index.html is one level above dist/assets/
        <base href="/app/static/" />         — absolute path on your server
        <base href="https://cdn.example.com/" /> — assets on a CDN
    -->
    <base href="./" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- Cache version — change this value to bust browser cache (no rebuild needed) -->
    <script>window.__CACHE_VERSION__ = new Date().toISOString().replace(/\D/g, '').slice(0, 14);</script>
    <!-- Configure default AI settings + UI prefs here -->
    <script>
      window.__CSV_AGENT_CONFIG__ = {
        defaultSettings: {
          provider: 'google',           // 'google' or 'openai'
          geminiApiKey: '',             // optional default Gemini key
          openAIApiKey: '',             // optional default OpenAI key
          simpleModel: 'gemini-3.1-flash-lite-preview',
          complexModel: 'gemini-3.1-flash-lite-preview',
          fallbackModel: 'gemini-2.5-flash', // auto-retry model on 503/rate-limit errors
          language: 'English',
          autoConfirmGoal: true,
        },
        // Force model selection — overrides user settings (cannot be changed in UI)
        // forceSimpleModel: 'gemini-3.1-flash-lite-preview',
        // forceComplexModel: 'gemini-3.1-flash-lite-preview',
        // forceFallbackModel: 'gemini-2.5-flash',  // force fallback model for all users
        ui: {
          endUserMode: false,           // set to true to hide advanced surfaces for end users
          showSettingsButton: true,     // set to false to hide the in-app Settings button
          showDataWarnings: true,       // governs Data Warning info section visibility
          showAgentThinkingModal: true, // controls "How the agent is thinking" modal
          showLongTermMemory: true,     // controls AI Long-Term Memory modal/button
          showNewSessionButton: true,   // controls the "New" header button and empty-state CSV uploads
          showHistoryButton: true,      // controls the "History" header button
          showDatabaseButton: true,     // controls the "Database" header button
          showWorkspaceButton: true,    // controls the "Workspace" header button
          showWorkflowButton: true,     // controls the "Workflow" header button
          showLogsButton: true,         // controls the "Logs" header button
          showChangeGoalButton: true,   // controls the "Change Goal" header button
          showAssistantToggleButton: true, // controls the collapsed assistant toggle button
          enableDuckDbQueryEngine: true,   // optional read-only DuckDB-WASM engine for execute_data_query
        },
      };
    </script>
    <script type="module" crossorigin src="./assets/csv_data_analysis_index.js?v=20260325123750"></script>
    <link rel="stylesheet" crossorigin href="./assets/csv_data_analysis_style.css?v=20260325123750">
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <!-- Initial loading screen — rendered instantly before any JS/WASM downloads.
         Automatically removed once React mounts into #root. -->
    <div id="app-loading-screen" style="
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f8fafc 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #334155; transition: opacity 0.4s ease-out;
    ">
      <style>
        /* --- Bar rise: grow from baseline with overshoot-settle --- */
        @keyframes app-loader-bar-rise {
          0% { transform: scaleY(0); opacity: 0; }
          60% { transform: scaleY(1.05); opacity: 1; }
          80% { transform: scaleY(0.97); }
          100% { transform: scaleY(1); opacity: 1; }
        }
        /* --- Data point dots pop in --- */
        @keyframes app-loader-dot-pop {
          0% { transform: scale(0); opacity: 0; }
          70% { transform: scale(1.3); opacity: 1; }
          100% { transform: scale(1); opacity: 1; }
        }
        /* --- Trend line draws itself --- */
        @keyframes app-loader-trend-draw {
          0% { stroke-dashoffset: var(--loader-trend-length, 89); opacity: 0; }
          10% { opacity: 1; }
          100% { stroke-dashoffset: 0; opacity: 1; }
        }
        /* --- Subtle shimmer sweep across icon card --- */
        @keyframes app-loader-shimmer {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(200%); }
        }
        @keyframes app-loader-progress {
          0% { width: 0%; }
          20% { width: 25%; }
          50% { width: 55%; }
          80% { width: 80%; }
          100% { width: 95%; }
        }
        @keyframes app-loader-dots {
          0%, 20% { content: ''; }
          40% { content: '.'; }
          60% { content: '..'; }
          80%, 100% { content: '...'; }
        }
        #app-loading-screen .loader-icon-wrap {
          position: relative; margin-bottom: 32px;
          display: flex; align-items: center; justify-content: center;
        }
        #app-loading-screen .loader-icon-svg {
          width: 160px; height: 128px;
          filter: drop-shadow(0 4px 20px rgba(37, 99, 235, 0.12))
                  drop-shadow(0 1px 4px rgba(0, 0, 0, 0.06));
        }
        /* Bars: rise from bottom */
        #app-loading-screen .loader-bar {
          transform-box: fill-box; transform-origin: center bottom;
          animation: app-loader-bar-rise 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
          opacity: 0;
        }
        #app-loading-screen .loader-bar-1 { animation-delay: 0.1s; }
        #app-loading-screen .loader-bar-2 { animation-delay: 0.2s; }
        #app-loading-screen .loader-bar-3 { animation-delay: 0.3s; }
        #app-loading-screen .loader-bar-4 { animation-delay: 0.4s; }
        #app-loading-screen .loader-bar-5 { animation-delay: 0.5s; }
        /* Data point dots: pop in after bars */
        #app-loading-screen .loader-dot {
          transform-box: fill-box; transform-origin: center center;
          animation: app-loader-dot-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
          opacity: 0;
        }
        #app-loading-screen .loader-dot-1 { animation-delay: 0.7s; }
        #app-loading-screen .loader-dot-2 { animation-delay: 0.8s; }
        #app-loading-screen .loader-dot-3 { animation-delay: 0.9s; }
        #app-loading-screen .loader-dot-4 { animation-delay: 1.0s; }
        #app-loading-screen .loader-dot-5 { animation-delay: 1.1s; }
        /* Trend line: draws after dots */
        #app-loading-screen .loader-trend {
          --loader-trend-length: 89;
          animation: app-loader-trend-draw 1.2s ease-out 1.3s forwards;
          stroke-dasharray: var(--loader-trend-length);
          stroke-dashoffset: var(--loader-trend-length);
          opacity: 0;
        }
        /* Shimmer: gentle sweep after everything settles */
        #app-loading-screen .loader-shimmer {
          animation: app-loader-shimmer 2.5s ease-in-out 2.5s infinite;
        }
        #app-loading-screen .loader-title {
          font-size: 24px; font-weight: 600; color: #1e293b;
          margin-bottom: 8px; letter-spacing: 0.5px;
        }
        #app-loading-screen .loader-subtitle {
          font-size: 14px; color: #64748b; margin-bottom: 28px;
          text-align: center; line-height: 1.5;
        }
        #app-loading-screen .loader-bar-track {
          width: 260px; height: 4px; border-radius: 2px;
          background: rgba(37, 99, 235, 0.10); overflow: hidden;
          margin-bottom: 16px;
        }
        #app-loading-screen .loader-bar-fill {
          height: 100%; border-radius: 2px;
          background: linear-gradient(90deg, #3b82f6, #2563eb);
          animation: app-loader-progress 12s ease-out forwards;
        }
        #app-loading-screen .loader-hint {
          font-size: 12px; color: #94a3b8;
        }
        #app-loading-screen .loader-hint::after {
          content: '';
          animation: app-loader-dots 1.5s steps(1) infinite;
        }
      </style>
      <div class="loader-icon-wrap">
        <svg class="loader-icon-svg" viewBox="0 0 120 96" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="ldr-card" x1="0" y1="0" x2="120" y2="96" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="1" stop-color="#f1f5f9"/>
            </linearGradient>
            <linearGradient id="ldr-bar-grad" x1="0" y1="16" x2="0" y2="76" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#3b82f6"/>
              <stop offset="1" stop-color="#2563eb"/>
            </linearGradient>
            <linearGradient id="ldr-shimmer" x1="0" y1="0" x2="60" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="rgba(255,255,255,0)"/>
              <stop offset="0.5" stop-color="rgba(255,255,255,0.4)"/>
              <stop offset="1" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
            <clipPath id="ldr-card-clip"><rect x="0" y="0" width="120" height="96" rx="12"/></clipPath>
          </defs>
          <!-- Card background -->
          <rect width="120" height="96" rx="12" fill="url(#ldr-card)"/>
          <rect width="120" height="96" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>
          <!-- Grid lines -->
          <line x1="24" y1="28" x2="108" y2="28" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="3 3"/>
          <line x1="24" y1="44" x2="108" y2="44" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="3 3"/>
          <line x1="24" y1="60" x2="108" y2="60" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="3 3"/>
          <!-- Y-axis -->
          <line x1="24" y1="16" x2="24" y2="76" stroke="#cbd5e1" stroke-width="1"/>
          <!-- X-axis/baseline -->
          <line x1="24" y1="76" x2="108" y2="76" stroke="#cbd5e1" stroke-width="1.5"/>
          <!-- 5 bars -->
          <rect class="loader-bar loader-bar-1" x="29" y="52" width="10" height="24" rx="2" fill="url(#ldr-bar-grad)"/>
          <rect class="loader-bar loader-bar-2" x="45" y="36" width="10" height="40" rx="2" fill="url(#ldr-bar-grad)"/>
          <rect class="loader-bar loader-bar-3" x="61" y="44" width="10" height="32" rx="2" fill="url(#ldr-bar-grad)"/>
          <rect class="loader-bar loader-bar-4" x="77" y="24" width="10" height="52" rx="2" fill="url(#ldr-bar-grad)"/>
          <rect class="loader-bar loader-bar-5" x="93" y="32" width="10" height="44" rx="2" fill="url(#ldr-bar-grad)"/>
          <!-- Data point dots -->
          <circle class="loader-dot loader-dot-1" cx="34" cy="52" r="3" fill="#1d4ed8"/>
          <circle class="loader-dot loader-dot-2" cx="50" cy="36" r="3" fill="#1d4ed8"/>
          <circle class="loader-dot loader-dot-3" cx="66" cy="44" r="3" fill="#1d4ed8"/>
          <circle class="loader-dot loader-dot-4" cx="82" cy="24" r="3" fill="#1d4ed8"/>
          <circle class="loader-dot loader-dot-5" cx="98" cy="32" r="3" fill="#1d4ed8"/>
          <!-- Trend line -->
          <path class="loader-trend" d="M34 52 C42 36, 42 36, 50 36 C58 36, 58 44, 66 44 C74 44, 74 24, 82 24 C90 24, 90 32, 98 32"
            stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" fill="none"/>
          <!-- Shimmer overlay -->
          <g clip-path="url(#ldr-card-clip)">
            <rect class="loader-shimmer" x="0" y="0" width="60" height="96" fill="url(#ldr-shimmer)"/>
          </g>
        </svg>
      </div>
      <div class="loader-title">AI Data Analysis</div>
      <div class="loader-subtitle">
        Loading analysis engine and data modules<br>
        First-time setup may take a moment — this is a one-time cost
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
      <div class="loader-hint">Loading analysis engine</div>
    </div>
    <script>
      // Loading overlay controller — listens for 'wasm-loading' custom events
      // dispatched by application code (vectorStore, duckDbWorkerClient).
      // WASM downloads happen inside Web Workers where fetch/PerformanceObserver
      // on the main thread cannot see them, so app code signals start/end explicitly.
      //
      // 1. Full-screen loading on initial boot (waits for React mount)
      // 2. Re-shows overlay whenever WASM loading starts (e.g. DuckDB, transformers ONNX)
      (function () {
        var root = document.getElementById('root');
        var screen = document.getElementById('app-loading-screen');
        if (!root || !screen) return;

        var hint = screen.querySelector('.loader-hint');
        var subtitle = screen.querySelector('.loader-subtitle');
        var barFill = screen.querySelector('.loader-bar-fill');
        var reactMounted = false;
        var initialDismissed = false;
        var overlayVisible = true;

        // Active WASM loading tasks: id → label
        var activeTasks = new Map();

        function updateHint() {
          if (!hint) return;
          if (activeTasks.size > 0) {
            var labels = [];
            activeTasks.forEach(function (label) { labels.push(label); });
            hint.textContent = 'Loading: ' + labels.join(', ');
          } else if (!reactMounted) {
            hint.textContent = 'Initializing application';
          } else {
            hint.textContent = 'Almost ready';
          }
        }

        function showOverlay(isInitial) {
          if (overlayVisible) return;
          overlayVisible = true;
          if (!isInitial) {
            screen.style.background = 'rgba(248, 250, 252, 0.92)';
            screen.style.backdropFilter = 'blur(6px)';
            if (subtitle) subtitle.textContent = 'Downloading required engine modules...';
            if (barFill) {
              barFill.style.animation = 'none';
              void barFill.offsetHeight;
              barFill.style.animation = 'app-loader-progress 30s ease-out forwards';
            }
          }
          screen.style.display = 'flex';
          screen.style.opacity = '0';
          void screen.offsetHeight;
          screen.style.opacity = '1';
        }

        function hideOverlay() {
          if (!overlayVisible) return;
          overlayVisible = false;
          screen.style.opacity = '0';
          setTimeout(function () {
            if (!overlayVisible) screen.style.display = 'none';
          }, 400);
        }

        function tryHide() {
          if (activeTasks.size > 0) return;
          if (!initialDismissed) {
            if (!reactMounted) return;
            initialDismissed = true;
          }
          hideOverlay();
        }

        // Listen for wasm-loading events from app code
        window.addEventListener('wasm-loading', function (e) {
          var detail = e.detail || {};
          if (detail.action === 'start') {
            activeTasks.set(detail.id, detail.label || detail.id);
            showOverlay(!initialDismissed);
            updateHint();
          } else if (detail.action === 'end') {
            activeTasks.delete(detail.id);
            updateHint();
            tryHide();
          }
        });

        // Detect React mount
        var mutObs = new MutationObserver(function () {
          if (root.children.length > 0) {
            mutObs.disconnect();
            reactMounted = true;
            updateHint();
            tryHide();
          }
        });
        mutObs.observe(root, { childList: true });

        // Safety fallback: hide after 60s
        setTimeout(function () {
          if (!initialDismissed) {
            initialDismissed = true;
            hideOverlay();
          }
        }, 60000);
      })();
    </script>

  </body>
</html>
